<style>
  :root {
    --bg: #020617;
    --panel: #0b1424;
    --border: #1a2744;
    --text: #c8d6e5;
    --text-secondary: #6b7d99;
    --accent: #00b4d8;
    --accent2: #0077b6;
    --gold: #f0c040;
    --purple: #a855f7;
    --red: #f43f5e;
    --green: #22d3bb;
    --cyan: #22d3ee;
    --orange: #fb923c;
    --neon-blue: #4cc9f0;
    --neon-glow: rgba(0, 180, 216, 0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ====== STARFIELD ====== */
  #starfield { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  /* ====== SCAN LINE ====== */
  .scan-line {
    position:fixed; top:0; left:0; width:100%; height:3px;
    background:linear-gradient(90deg, transparent, rgba(0,180,216,0.15), transparent);
    z-index:0; pointer-events:none;
    animation: scanDown 4s linear infinite;
  }
  @keyframes scanDown {
    0% { top:-3px; } 100% { top:100%; }
  }

  .container { max-width:1500px; margin:0 auto; padding:24px 20px 60px; position:relative; z-index:1; }

  /* ====== HEADER ====== */
  .header {
    text-align:center; padding:48px 20px 8px; position:relative;
  }
  .header::before {
    content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:600px; height:200px;
    background:radial-gradient(ellipse, rgba(0,180,216,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .header .logo-frame {
    display:inline-block; padding:3px; border-radius:16px;
    background:linear-gradient(135deg, var(--accent), var(--accent2), var(--accent));
    margin-bottom:12px;
  }
  .header .logo-inner {
    background:var(--bg); border-radius:14px; padding:16px 36px;
  }
  .header h1 {
    font-size:2.6rem; font-weight:900; letter-spacing:4px;
    background:linear-gradient(180deg, #e0f2fe 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:none; filter:drop-shadow(0 0 20px rgba(0,180,216,0.3));
  }
  .header .subtitle {
    color:var(--text-secondary); margin-top:4px; font-size:0.9rem; letter-spacing:2px;
  }

  /* ====== STATS BAR ====== */
  .stats-bar {
    display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin:24px 0;
  }
  .stat-item {
    text-align:center; padding:14px 20px;
    background:linear-gradient(180deg, rgba(11,20,36,0.9), rgba(11,20,36,0.6));
    border:1px solid var(--border); position:relative;
    min-width:90px;
    clip-path:polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  }
  .stat-item:first-child {
    border-left:2px solid var(--accent);
    box-shadow:inset 0 0 20px rgba(0,180,216,0.05);
  }
  .stat-item .num {
    font-size:1.8rem; font-weight:900;
    font-family:"SF Mono","Cascadia Code","Consolas",monospace;
    color:var(--neon-blue); text-shadow:0 0 12px var(--neon-glow);
  }
  .stat-item .label {
    font-size:0.7rem; color:var(--text-secondary); margin-top:4px;
    text-transform:uppercase; letter-spacing:1px;
  }

  /* ====== TABS ====== */
  .main-tabs {
    display:flex; gap:2px; background:var(--panel);
    border:1px solid var(--border); padding:4px; margin-bottom:8px;
    position:relative;
  }
  .main-tabs::before {
    content:''; position:absolute; top:-1px; left:20px; right:20px; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .main-tab {
    flex:1; padding:12px 20px; text-align:center;
    cursor:pointer; font-weight:700; font-size:0.95rem;
    transition:all 0.3s; color:var(--text-secondary);
    border:none; background:none; white-space:nowrap;
    position:relative; letter-spacing:1px;
  }
  .main-tab:hover { color:var(--text); }
  .main-tab.active {
    color:#fff;
    background:linear-gradient(180deg, rgba(0,180,216,0.15), rgba(0,119,182,0.05));
    box-shadow:inset 0 1px 0 rgba(0,180,216,0.3);
  }
  .main-tab.active::after {
    content:''; position:absolute; bottom:0; left:30%; right:30%; height:2px;
    background:var(--accent); box-shadow:0 0 10px var(--neon-glow);
  }

  .sub-tabs {
    display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;
  }
  .sub-tab {
    padding:7px 18px; cursor:pointer;
    font-size:0.83rem; font-weight:600; color:var(--text-secondary);
    border:1px solid var(--border); background:var(--panel);
    transition:all 0.25s; white-space:nowrap;
    clip-path:polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
  }
  .sub-tab:hover { border-color:var(--accent); color:var(--text); box-shadow:0 0 12px rgba(0,180,216,0.1); }
  .sub-tab.active { background:rgba(0,180,216,0.12); border-color:var(--accent); color:var(--neon-blue); }

  /* ====== SEARCH ====== */
  .search-wrap { position:relative; margin-bottom:24px; }
  .search-wrap input {
    width:100%; padding:12px 16px 12px 46px;
    background:var(--panel); border:1px solid var(--border);
    color:var(--text); font-size:0.9rem; outline:none;
    transition:border-color 0.3s, box-shadow 0.3s;
    letter-spacing:0.5px;
  }
  .search-wrap input:focus {
    border-color:var(--accent);
    box-shadow:0 0 20px rgba(0,180,216,0.1), inset 0 0 20px rgba(0,180,216,0.03);
  }
  .search-wrap input::placeholder { color:#3a4f66; }
  .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:1rem; }

  /* ====== SECTION ====== */
  .table-section { margin-bottom:40px; }
  .section-title {
    font-size:1.1rem; font-weight:700; margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
    letter-spacing:1px; color:var(--neon-blue);
    border-left:3px solid var(--accent); padding-left:14px;
  }
  .section-title .count {
    font-size:0.78rem; color:var(--text-secondary); font-weight:400;
  }

  /* ====== TABLE ====== */
  .table-wrap {
    overflow-x:auto;
    border:1px solid var(--border);
    background:rgba(11,20,36,0.6);
    position:relative;
  }
  .table-wrap::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(0,180,216,0.3), transparent);
    z-index:2;
  }
  table { width:100%; border-collapse:collapse; font-size:0.84rem; white-space:nowrap; }
  thead th {
    position:sticky; top:0; background:#0f1a2e; color:var(--accent);
    font-weight:600; font-size:0.74rem; text-align:left; padding:12px 14px;
    border-bottom:2px solid rgba(0,180,216,0.2);
    text-transform:uppercase; letter-spacing:1px; z-index:1;
  }
  tbody td { padding:11px 14px; border-bottom:1px solid rgba(255,255,255,0.02); }
  tbody tr { transition:background 0.2s; }
  tbody tr:hover { background:rgba(0,180,216,0.04); }

  /* ====== EQUIP PREVIEW ICON (CSS) ====== */
  .eq-icon {
    display:inline-flex; align-items:center; justify-content:center;
    width:40px; height:40px; border-radius:6px;

    background:linear-gradient(135deg, rgba(34,211,187,0.2), rgba(34,211,187,0.05));

  /* ====== BADGES ====== */
  .tier {
    display:inline-block; padding:3px 10px; font-size:0.7rem; font-weight:700;
    letter-spacing:0.5px;
    clip-path:polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%);

  .tier-2 { background:rgba(240,192,64,0.12); color:#fbbf24; border:1px solid rgba(240,192,64,0.25); }
  .tier-3 { background:rgba(168,85,247,0.12); color:#c084fc; border:1px solid rgba(168,85,247,0.25); }
  .tier-4 { background:rgba(0,180,216,0.12); color:#67e8f9; border:1px solid rgba(0,180,216,0.25); }

  .god-card {

  .god-card:hover {

  .god-card .formula { font-size:0.82rem; color:var(--text-secondary); margin-bottom:8px; }
  .god-card .formula span { color:var(--gold); font-weight:600; }
  .god-card .skill { font-size:0.8rem; color:var(--cyan); }

  /* ====== FOOTER ====== */
  .footer { text-align:center; padding:40px 0 0; color:var(--text-secondary); font-size:0.73rem; line-height:1.8; letter-spacing:0.5px; }

    .stat-item { padding:10px 14px; min-width:70px; }
    .stat-item .num { font-size:1.4rem; }
    .eq-icon { width:32px; height:32px; font-size:1rem; }

</style>
</head>

// ====== STARFIELD ======
(function(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  let stars=[],w,h;
  function resize(){ w=c.width=window.innerWidth; h=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<180;i++){
    stars.push({
      x:Math.random()*w, y:Math.random()*h,
      r:Math.random()*1.6+0.3,
      o:Math.random(),
      s:Math.random()*0.008+0.002,
      d:Math.random()*0.02-0.01
    });
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    stars.forEach(s=>{
      s.o+=s.d; if(s.o>1||s.o<0.2) s.d*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,240,${s.o})`; ctx.fill();
      if(s.r>1.2){
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*1.8,0,Math.PI*2);
        ctx.fillStyle=`rgba(100,180,220,${s.o*0.15})`; ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ====== LOAD FROM LOCALSTORAGE (or fallback to defaults) ======
function loadFromStorage(key, fallback) {
  try {
    const stored = localStorage.getItem(key);
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return JSON.parse(JSON.stringify(fallback));
}

    subweapon: `<svg width="36" height="36" viewBox="0 0 36 36"><defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/></linearGradient></defs><circle cx="18" cy="18" r="14" fill="none" stroke="url(#sg)" stroke-width="1.5" opacity="0.9"/><circle cx="18" cy="18" r="8" fill="none" stroke="url(#sg)" stroke-width="1" opacity="0.5"/><line x1="18" y1="4" x2="18" y2="10" stroke="url(#sg)" stroke-width="1.5" opacity="0.6"/><line x1="18" y1="26" x2="18" y2="32" stroke="url(#sg)" stroke-width="1.5" opacity="0.6"/><line x1="4" y1="18" x2="10" y2="18" stroke="url(#sg)" stroke-width="1.5" opacity="0.6"/><line x1="26" y1="18" x2="32" y2="18" stroke="url(#sg)" stroke-width="1.5" opacity="0.6"/><circle cx="18" cy="18" r="2" fill="#fb923c" opacity="0.9"/></svg>`,
    wingman: `<svg width="36" height="36" viewBox="0 0 36 36"><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><ellipse cx="18" cy="18" rx="15" ry="10" fill="none" stroke="url(#wg)" stroke-width="1.5" opacity="0.9"/><ellipse cx="18" cy="18" rx="6" ry="12" fill="none" stroke="url(#wg)" stroke-width="1" opacity="0.5"/><circle cx="18" cy="18" r="2.5" fill="#a855f7" opacity="0.8"/><circle cx="8" cy="14" r="1.5" fill="#a855f7" opacity="0.5"/><circle cx="28" cy="14" r="1.5" fill="#a855f7" opacity="0.5"/></svg>`,
  };
  return `<span class="eq-icon icon-${cat}">${icons[cat] || ''}</span>`;
}

// ====== RENDER ======
let currentView = 'star5';
let currentCat = 'all';

function buildStar5Table(items, cols, cat) {
  let html = '<div class="table-wrap"><table><thead><tr>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  items.forEach(eq => {
    const vals = cols.map(c => {
      if (c === '装备名称') return `${getIconHTML(cat, eq.series, eq.img)}<strong>${eq.name}</strong>`;
      if (c === '系列') return eq.series;
      if (c === '进化路线') return `<span style="font-size:0.73rem;color:var(--text-secondary)">${eq.evo}</span>`;
      if (c === '满级攻击') return `<span style="color:#f87171;font-weight:700;font-family:monospace">${eq.atk}</span>`;
      if (c === '满级生命') return `<span style="color:#22d3bb;font-weight:700;font-family:monospace">${eq.hp}</span>`;
      if (c === '战力折算') return `<span style="font-family:monospace">${eq.defScore}</span>`;
      if (c === '特技') return `<span class="skill-tag">${eq.skill}</span>`;
      if (c === '效果说明') return `<span style="font-size:0.76rem;color:var(--text-secondary)">${eq.skillNote}</span>`;
      if (c === '品质梯队') return `<span class="tier tier-${eq.tier}">${eq.rank}</span>`;
      return '';
    });
    html += `<tr data-cat="${eq._cat||''}" data-search="${eq.name} ${eq.series} ${eq.skill} ${eq.skillNote||''} ${eq.rank||''}">${vals.map(v=>`<td>${v}</td>`).join('')}</tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function renderStar5(cat) {
  let html = '';
  const cats = cat === 'all' ? ['fighter','armor','subweapon','wingman'] : [cat];
  const titles = { fighter:'✈ 战机', armor:'🛡 装甲', subweapon:'◎ 副武器', wingman:'✦ 僚机' };
  const colsMap = {
    fighter: ['装备名称','系列','进化路线','满级攻击','特技','效果说明','品质梯队'],
    armor: ['装备名称','系列','进化路线','满级生命','战力折算','特技','效果说明','品质梯队'],
    subweapon: ['装备名称','系列','进化路线','满级攻击','特技','效果说明','品质梯队'],
    wingman: ['装备名称','系列','进化路线','满级攻击','特技','效果说明','品质梯队'],
  };
  cats.forEach(c => {
    const items = star5[c].map(e => ({...e, _cat:c}));
    html += `<div class="table-section" data-godcat="${c}">
      <div class="section-title">${titles[c]} <span class="count">（${items.length} 件）</span></div>
      ${buildStar5Table(items, colsMap[c], c)}
    </div>`;
  });
  return html;
}

function renderGodEquip(cat) {
  let html = '';
  const cats = cat === 'god-all' ? ['fighter','armor','sub','wing'] : [cat.replace('god-','')];
  const titles = { fighter:'✈ 战神机体', armor:'🛡 战神装甲', sub:'◎ 战神副武器', wing:'✦ 战神僚机' };
  const catMap = { fighter:'fighter', armor:'armor', sub:'sub', wing:'wing' };
  cats.forEach(c => {
    const items = godEquip[catMap[c]] || [];
    html += `<div class="table-section" data-godcat="${c}">
      <div class="section-title">${titles[c]} <span class="count">（${items.length} 件）</span></div>
      <div class="god-grid">`;
    items.forEach(eq => {
      html += `<div class="god-card" data-search="${eq.name} ${eq.mats} ${eq.skill} ${eq.note||''}">
        <h4>✦ ${eq.name} <span class="tier tier-${eq.tier}" style="margin-left:8px;">T${eq.tier}</span></h4>
        <div class="formula">合成材料：<span>${eq.mats}</span></div>
        <div class="skill">特技效果：${eq.skill}</div>
        ${eq.note ? `<div style="font-size:0.76rem;color:var(--text-secondary);margin-top:8px;">${eq.note}</div>` : ''}
      </div>`;
    });
    html += '</div></div>';
  });
  return html;
}

function updateContent() {
  const content = document.getElementById('content');
  content.innerHTML = currentView === 'star5' ? renderStar5(currentCat) : renderGodEquip(currentCat);
  applySearch(); updateStats();
}

function applySearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('[data-search]').forEach(el => {
    el.classList.toggle('hidden', q !== '' && !el.dataset.search.toLowerCase().includes(q));
  });
  document.querySelectorAll('.table-section').forEach(sec => {
    const vis = sec.querySelectorAll('tbody tr:not(.hidden), .god-card:not(.hidden)').length > 0;
    sec.classList.toggle('hidden', !vis);
  });
  updateStats();
}

function updateStats() {
  let f=0,a=0,s=0,w=0,g=0;
  if (currentView === 'star5') {
    document.querySelectorAll('tbody tr:not(.hidden)').forEach(tr => {
      const c = tr.dataset.cat;
      if (c==='fighter') f++; else if (c==='armor') a++;
      else if (c==='subweapon') s++; else if (c==='wingman') w++;
    });
  } else {
    document.querySelectorAll('.god-card:not(.hidden)').forEach(card => {
      const parent = card.closest('[data-godcat]');
      const gc = parent ? parent.dataset.godcat : '';
      if (gc==='fighter') f++; else if (gc==='armor') a++;
      else if (gc==='sub') s++; else if (gc==='wing') w++;
    });
    g = f+a+s+w;
  }
  document.getElementById('stat-total').textContent = f+a+s+w+(currentView==='god'?g:0);
  document.getElementById('stat-fighter').textContent = f;
  document.getElementById('stat-armor').textContent = a;
  document.getElementById('stat-sub').textContent = s;
  document.getElementById('stat-wing').textContent = w;
  document.getElementById('stat-god').textContent = g;
}

// ====== EVENTS ======
document.querySelectorAll('.main-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    currentCat = currentView === 'star5' ? 'all' : 'god-all';
    document.getElementById('sub-tabs-star5').classList.toggle('hidden', currentView !== 'star5');
    document.getElementById('sub-tabs-god').classList.toggle('hidden', currentView !== 'god');
    document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
    const sel = currentView === 'star5' ? '[data-cat="all"]' : '[data-cat="god-all"]';
    document.querySelector(sel).classList.add('active');
    updateContent();
  });
});
document.querySelectorAll('.sub-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const parent = tab.closest('.sub-tabs');
    parent.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    updateContent();
  });
});
document.getElementById('search').addEventListener('input', applySearch);

updateContent();
</script>
</body>
</html>
