<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆战机 - 装备数据管理</title>
<style>
  :root {
    --bg: #050b14; --panel: #0c1525; --border: #16233f;
    --text: #c8d6e5; --text2: #5e7292;
    --accent: #00b4d8; --gold: #f0c040; --red: #f43f5e;
    --green: #22d3bb; --purple: #a855f7; --cyan: #22d3ee; --orange: #fb923c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex;
  }
  /* SIDEBAR */
  .side {
    width: 220px; min-height: 100vh; background: #080f1f;
    border-right: 1px solid var(--border); position: fixed; top:0; left:0; bottom:0;
    padding: 20px 0; overflow-y: auto; z-index: 10;
  }
  .side h2 {
    text-align:center; font-size:1rem; letter-spacing:2px; padding:0 20px 16px;
    border-bottom:1px solid var(--border); margin-bottom:8px;
    background:linear-gradient(180deg, #e0f2fe, var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .side .gtitle {
    font-size:0.62rem; color:var(--text2); text-transform:uppercase;
    letter-spacing:1.5px; padding:12px 16px 4px; font-weight:700;
  }
  .side .nav {
    display:block; width:100%; padding:9px 16px; border:none; background:none;
    color:var(--text2); font-size:0.84rem; text-align:left; cursor:pointer;
    transition:all 0.15s; font-family:inherit;
  }
  .side .nav:hover { background:rgba(255,255,255,0.02); color:var(--text); }
  .side .nav.on { background:rgba(0,180,216,0.1); color:var(--accent); font-weight:600; }
  .side .btns { padding:12px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:6px; }
  .side .btns a { text-decoration:none; }

  /* MAIN */
  .main { margin-left:220px; flex:1; padding:24px 28px; }
  .hbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .hbar h3 { font-size:1.1rem; letter-spacing:1px; }

  /* BTN */
  .btn {
    padding:7px 14px; border-radius:4px; border:1px solid var(--border);
    cursor:pointer; font-size:0.8rem; font-weight:600;
    background:var(--panel); color:var(--text); font-family:inherit;
    transition:all 0.15s; white-space:nowrap;
  }
  .btn:hover { border-color:var(--accent); }
  .btn1 { background:rgba(0,180,216,0.12); border-color:var(--accent); color:var(--accent); }
  .btn1:hover { background:rgba(0,180,216,0.22); }
  .btnx { border-color:rgba(244,63,94,0.3); color:var(--red); }
  .btnx:hover { background:rgba(244,63,94,0.08); border-color:var(--red); }
  .btnsm { padding:3px 8px; font-size:0.7rem; }

  /* TABLE */
  .twrap { overflow-x:auto; border:1px solid var(--border); background:var(--panel); }
  table { width:100%; border-collapse:collapse; font-size:0.81rem; }
  thead th {
    background:#0d1a30; color:var(--accent); font-weight:600; font-size:0.7rem;
    text-align:left; padding:9px 10px; border-bottom:2px solid rgba(0,180,216,0.15);
    text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap;
  }
  tbody td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.02); }
  tbody tr:hover { background:rgba(0,180,216,0.03); }
  .tdimg img { width:34px; height:34px; object-fit:contain; border-radius:3px; background:rgba(0,0,0,0.3); border:1px solid var(--border); }

  .tag {
    display:inline-block; padding:2px 8px; font-size:0.68rem; font-weight:700; border-radius:3px;
  }
  .t1 { background:rgba(244,63,94,0.12); color:#f87171; }
  .t2 { background:rgba(240,192,64,0.12); color:#fbbf24; }
  .t3 { background:rgba(168,85,247,0.12); color:#c084fc; }
  .t4 { background:rgba(0,180,216,0.12); color:#67e8f9; }
  .t5 { background:rgba(107,125,153,0.12); color:#9ca3af; }
  .stag { background:rgba(34,211,238,0.07); color:var(--cyan); }

  /* MODAL */
  .modal-bg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.72); z-index:999;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-box {
    background:var(--panel); border:1px solid var(--border);
    width:92%; max-width:680px; max-height:82vh; overflow-y:auto;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
  }
  .modal-hd {
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; background:var(--panel); z-index:1;
  }
  .modal-hd h4 { font-size:0.95rem; }
  .modal-cls { background:none; border:none; color:var(--text2); font-size:1.2rem; cursor:pointer; }
  .modal-cls:hover { color:var(--red); }
  .modal-bd { padding:18px; }
  .modal-ft { padding:12px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }

  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .ffull { grid-column:1/-1; }
  .fg { display:flex; flex-direction:column; gap:3px; }
  .fg label { font-size:0.72rem; color:var(--text2); font-weight:600; }
  .fg input, .fg select, .fg textarea {
    padding:7px 10px; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-size:0.82rem; outline:none; border-radius:3px; font-family:inherit;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--accent); }
  .fg textarea { resize:vertical; min-height:52px; }
  .upzone { border:2px dashed var(--border); padding:14px; text-align:center; cursor:pointer; border-radius:4px; margin-top:4px; }
  .upzone:hover { border-color:var(--accent); background:rgba(0,180,216,0.02); }
  .upzone p { font-size:0.76rem; color:var(--text2); }
  .preimg { width:80px; height:80px; object-fit:contain; border-radius:4px; background:rgba(0,0,0,0.4); border:1px solid var(--border); margin-top:6px; }

  .hidden { display:none !important; }
  .empty { text-align:center; padding:50px 20px; color:var(--text2); }

  .toast {
    position:fixed; bottom:30px; right:30px; z-index:1100;
    padding:10px 18px; border-radius:4px; font-size:0.82rem; font-weight:600;
    animation:si 0.3s ease;
  }
  .toast-ok { background:rgba(34,211,187,0.12); border:1px solid rgba(34,211,187,0.3); color:var(--green); }
  .toast-err { background:rgba(244,63,94,0.12); border:1px solid rgba(244,63,94,0.3); color:var(--red); }
  @keyframes si { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

// ====== STATE ======
var mode = 'star5';
var cat = 'fighter';
var editIdx = -1;

// ====== HELPERS ======
function esc(s) {
  s = String(s||'');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function storageKey() { return mode === 'star5' ? 'lt_equip_star5' : 'lt_equip_god'; }
function getDefault() { return mode === 'star5' ? D5 : DG; }
function getData() {
  var key = storageKey();
  try { var s = localStorage.getItem(key); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(getDefault()));
}
function saveData(d) { localStorage.setItem(storageKey(), JSON.stringify(d)); }
function getItems() {
  var all = getData();
  return all[cat] || [];
}
function toast(msg, type) {
  type = type || 'ok';
  var t = document.createElement('div');
  t.className = 'toast toast-'+type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2400);
}

var catTitles = {
  star5: {fighter:'五星装备 · 战机',armor:'五星装备 · 装甲',subweapon:'五星装备 · 副武器',wingman:'五星装备 · 僚机'},
  god: {fighter:'战神装备 · 机体',armor:'战神装备 · 装甲',sub:'战神装备 · 副武器',wing:'战神装备 · 僚机'},
};

// ====== RENDER TABLE ======
function renderTable() {
  document.getElementById('ptitle').textContent = catTitles[mode] && catTitles[mode][cat] ? catTitles[mode][cat] : '装备列表';
  var items = getItems();
  var thead = document.getElementById('thead');
  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty-msg');

  if (mode === 'star5') {
    if (cat === 'armor') {
      thead.innerHTML = '<tr><th>图片</th><th>装备名称</th><th>系列</th><th>满级生命</th><th>战力折算</th><th>特技</th><th>品质</th><th>操作</th></tr>';
    } else {
      thead.innerHTML = '<tr><th>图片</th><th>装备名称</th><th>系列</th><th>满级攻击</th><th>特技</th><th>品质</th><th>操作</th></tr>';
    }
  } else {
    thead.innerHTML = '<tr><th>图片</th><th>战神名称</th><th>合成材料</th><th>特技</th><th>强度</th><th>操作</th></tr>';
  }

  if (items.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = items.map(function(eq, i) {
    var row = '';
    row += '<td class="tdimg">'+(eq.img ? '<img src="'+esc(eq.img)+'" onerror="this.style.display=\'none\'">' : '<span style="color:var(--text2);font-size:0.7rem;">—</span>')+'</td>';
    row += '<td><strong>'+esc(eq.name)+'</strong></td>';
    if (mode === 'star5') {
      row += '<td>'+esc(eq.series||'')+'</td>';
      if (cat === 'armor') {
        row += '<td style="color:#22d3bb;font-family:monospace">'+esc(eq.hp||'')+'</td>';
        row += '<td style="font-family:monospace">'+esc(eq.defScore||'')+'</td>';
      } else {
        row += '<td style="color:#f87171;font-family:monospace">'+esc(eq.atk||'')+'</td>';
      }
      row += '<td><span class="tag stag">'+esc(eq.skill||'')+'</span></td>';
      row += '<td><span class="tag t'+(eq.tier||5)+'">'+esc(eq.rank||'')+'</span></td>';
    } else {
      row += '<td>'+esc(eq.mats||'')+'</td>';
      row += '<td><span style="color:var(--cyan)">'+esc(eq.skill||'')+'</span></td>';
      row += '<td><span class="tag t'+(eq.tier||3)+'">T'+(eq.tier||3)+'</span></td>';
    }
    row += '<td><button class="btn btnsm" data-action="edit" data-idx="'+i+'">✎</button> <button class="btn btnsm btnx" data-action="del" data-idx="'+i+'">✕</button></td>';
    return '<tr>'+row+'</tr>';
  }).join('');
}

// ====== FILTER ======
document.getElementById('qsearch').addEventListener('input', function() {
  var q = this.value.toLowerCase().trim();
  var rows = document.querySelectorAll('#tbody tr');
  rows.forEach(function(tr) {
    tr.style.display = !q || tr.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
});

// ====== MODAL ======
var modalBg = document.getElementById('modal-bg');
var modalTitle = document.getElementById('modal-title');
var modalBody = document.getElementById('modal-body');

function closeModal() {
  modalBg.classList.add('hidden');
  editIdx = -1;
}
function openModal(title, data) {
  editIdx = (data && data._idx !== undefined) ? data._idx : -1;
  modalTitle.textContent = title;
  buildForm(data || {});
  modalBg.classList.remove('hidden');
}

// Modal close events
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
modalBg.addEventListener('click', function(e) { if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && !modalBg.classList.contains('hidden')) closeModal(); });

// ====== BUILD FORM ======
function buildForm(data) {
  var html = '<div class="fgrid">';

  // Image field
  html += '<div class="fg ffull">';
  html += '<label>装备图片 URL</label>';
  html += '<input type="text" id="f-img" value="'+esc(data.img||'')+'" placeholder="输入图片URL（可选）">';
  html += '<div id="preview-wrap">'+(data.img ? '<img src="'+esc(data.img)+'" class="preimg" onerror="this.style.display=\'none\'">' : '')+'</div>';
  html += '<div class="upzone" id="upzone">';
  html += '<p>📁 点击上传本地图片（自动转 Base64）</p>';
  html += '</div>';
  html += '<input type="file" id="file-up" accept="image/*" style="display:none;">';
  html += '</div>';

  // Fields
  var fields;
  if (mode === 'star5') {
    fields = [
      {key:'name',label:'装备名称',req:true},
      {key:'series',label:'系列',req:true},
      {key:'evo',label:'进化路线',req:true,full:true},
    ];
    if (cat === 'armor') {
      fields.push({key:'hp',label:'满级生命',req:true});
      fields.push({key:'defScore',label:'战力折算',req:true});
    } else {
      fields.push({key:'atk',label:'满级攻击',req:true});
    }
    fields.push({key:'skill',label:'特技',req:true});
    fields.push({key:'skillNote',label:'效果说明',full:true});
    fields.push({key:'rank',label:'品质等级文字',req:true});
    fields.push({key:'tier',label:'品质梯队(1-5)',type:'select',opts:['1','2','3','4','5'],req:true});
  } else {
    fields = [
      {key:'name',label:'战神名称',req:true},
      {key:'mats',label:'合成材料',req:true,full:true},
      {key:'skill',label:'特技效果',req:true},
      {key:'note',label:'备注',full:true},
      {key:'tier',label:'强度梯队(1-3)',type:'select',opts:['1','2','3'],req:true},
    ];
  }

  fields.forEach(function(f) {
    var val = data[f.key] !== undefined ? String(data[f.key]) : '';
    var cls = f.full ? 'ffull' : '';
    html += '<div class="fg '+cls+'">';
    html += '<label>'+f.label+(f.req?' *':'')+'</label>';
    if (f.type === 'select') {
      html += '<select id="f-'+f.key+'">';
      (f.opts||[]).forEach(function(o) {
        html += '<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';
      });
      html += '</select>';
    } else {
      html += '<input type="text" id="f-'+f.key+'" value="'+esc(val)+'">';
    }
    html += '</div>';
  });

  html += '</div>';
  modalBody.innerHTML = html;

  // Bind upload
  var upzone = document.getElementById('upzone');
  var fileUp = document.getElementById('file-up');
  if (upzone && fileUp) {
    upzone.addEventListener('click', function(){ fileUp.click(); });
    fileUp.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        var b64 = ev.target.result;
        var imgInput = document.getElementById('f-img');
        var pw = document.getElementById('preview-wrap');
        if (imgInput) imgInput.value = b64;
        if (pw) pw.innerHTML = '<img src="'+b64+'" class="preimg">';
        toast('图片已加载');
      };
      reader.readAsDataURL(file);
    });
  }

  // Bind preview
  var imgInput = document.getElementById('f-img');
  var pw = document.getElementById('preview-wrap');
  if (imgInput && pw) {
    imgInput.addEventListener('input', function() {
      if (imgInput.value) {
        pw.innerHTML = '<img src="'+esc(imgInput.value)+'" class="preimg" onerror="this.style.display=\'none\'">';
      } else {
        pw.innerHTML = '';
      }
    });
  }
}

// ====== SAVE ======
document.getElementById('btn-save').addEventListener('click', function() {
  var data = {};
  data.img = document.getElementById('f-img') ? document.getElementById('f-img').value.trim() : '';

  // Collect field values
  var fieldDefs;
  if (mode === 'star5') {
    fieldDefs = [
      {key:'name',req:true},{key:'series',req:true},{key:'evo',req:true},
    ];
    if (cat === 'armor') {
      fieldDefs.push({key:'hp',req:true},{key:'defScore',req:true});
    } else {
      fieldDefs.push({key:'atk',req:true});
    }
    fieldDefs.push({key:'skill',req:true},{key:'skillNote'},{key:'rank',req:true},{key:'tier',req:true});
  } else {
    fieldDefs = [
      {key:'name',req:true},{key:'mats',req:true},{key:'skill',req:true},{key:'note'},{key:'tier',req:true},
    ];
  }

  var hasError = false;
  fieldDefs.forEach(function(f) {
    var el = document.getElementById('f-'+f.key);
    if (el) {
      var v = el.value.trim();
      if (f.req && !v) { hasError = true; el.style.borderColor = 'var(--red)'; }
      else { el.style.borderColor = ''; }
      data[f.key] = v;
    }
  });

  if (hasError) { toast('请填写所有必填字段', 'err'); return; }

  var all = getData();
  if (editIdx >= 0) {
    all[cat][editIdx] = data;
  } else {
    all[cat].push(data);
  }
  saveData(all);
  closeModal();
  renderTable();
  toast(editIdx >= 0 ? '装备已更新' : '装备已添加');
});

// ====== TABLE ACTIONS (delegation) ======
document.getElementById('tbody').addEventListener('click', function(e) {
  var target = e.target;
  if (!target.dataset.action) return;
  var idx = parseInt(target.dataset.idx, 10);
  var items = getItems();
  if (target.dataset.action === 'edit') {
    var item = JSON.parse(JSON.stringify(items[idx]));
    item._idx = idx;
    openModal('编辑装备 — '+item.name, item);
  } else if (target.dataset.action === 'del') {
    if (!confirm('确定删除 "'+items[idx].name+'" 吗？此操作不可恢复。')) return;
    var all = getData();
    all[cat].splice(idx, 1);
    saveData(all);
    renderTable();
    toast('装备已删除');
  }
});

// ====== ADD BUTTON ======
document.getElementById('btn-add').addEventListener('click', function() {
  openModal('添加装备', {});
});

// ====== NAVIGATION ======
document.querySelectorAll('.side .nav').forEach(function(nav) {
  nav.addEventListener('click', function() {
    document.querySelectorAll('.side .nav').forEach(function(n){ n.classList.remove('on'); });
    nav.classList.add('on');
    mode = nav.dataset.m;
    cat = nav.dataset.c;
    renderTable();
    document.getElementById('qsearch').value = '';
  });
});

// ====== EXPORT / IMPORT / RESET ======
document.getElementById('btn-export').addEventListener('click', function() {
  var data = {
    star5: JSON.parse(localStorage.getItem('lt_equip_star5')||'null') || D5,
    god: JSON.parse(localStorage.getItem('lt_equip_god')||'null') || DG,
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '雷霆战机装备数据_备份.json';
  a.click();
  toast('数据已导出');
});

document.getElementById('btn-import').addEventListener('click', function() {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (data.star5) localStorage.setItem('lt_equip_star5', JSON.stringify(data.star5));
      if (data.god) localStorage.setItem('lt_equip_god', JSON.stringify(data.god));
      renderTable();
      toast('数据导入成功！');
    } catch(err) { toast('JSON 格式错误', 'err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btn-reset').addEventListener('click', function() {
  if (!confirm('确定恢复所有数据为默认值吗？自定义数据将全部丢失！')) return;
  localStorage.removeItem('lt_equip_star5');
  localStorage.removeItem('lt_equip_god');
  renderTable();
  toast('已恢复默认数据');
});

// ====== INIT ======
renderTable();
</script>
</body>
</html>
